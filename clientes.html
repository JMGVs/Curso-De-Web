<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100">

<script>
if(sessionStorage.getItem("login")!=="ok"){
    window.location="index.html";
}
</script>

<header class="bg-primary text-white py-4">
    <div class="container">
        <h1 class="mb-0">Módulo de Clientes</h1>
    </div>
</header>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="inicio.html">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="ventas.html">Ventas</a></li>
                <li class="nav-item"><a class="nav-link" href="productos.html">Productos</a></li>
                <li class="nav-item"><a class="nav-link active" href="clientes.html">Clientes</a></li>
            </ul>
        </div>
    </div>
</nav>

<section class="container flex-grow-1 py-5">
    <div class="row">
        <article class="col-md-8">

            <!-- FORMULARIO -->
            <div class="card mb-4">
                <div class="card-body">
                    <h2 class="card-title mb-4">Registrar Cliente</h2>

                    <form id="formCliente">
                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" id="nombre" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Teléfono</label>
                            <input type="tel" id="telefono" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" id="email" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Guardar Cliente</button>
                    </form>
                </div>
            </div>

            <!-- TABLA -->
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Clientes Registrados</h5>
                    <table class="table table-striped table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>Nombre</th>
                                <th>Teléfono</th>
                                <th>Email</th>
                            </tr>
                        </thead>
                        <tbody id="tablaClientes"></tbody>
                    </table>
                </div>
            </div>

        </article>

        <aside class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <h3 class="card-title">Ayuda</h3>
                    <p class="card-text">Agrega y consulta los datos de tus clientes.</p>
                </div>
            </div>
        </aside>
    </div>
</section>

<footer class="bg-dark text-white text-center py-3 mt-auto">
    <p class="mb-0">Derechos reservados ©</p>
</footer>

<script>
// ===============================
// BASE DE DATOS SIMULADA
// ===============================
let clientes = JSON.parse(localStorage.getItem("clientes")) || [
    {nombre: "Juan Pérez", telefono: "9511234567", email: "juan@gmail.com"},
    {nombre: "María López", telefono: "9519876543", email: "maria@gmail.com"},
    {nombre: "Carlos Sánchez", telefono: "9514567890", email: "carlos@gmail.com"}
];

// Guardar si es primera vez
localStorage.setItem("clientes", JSON.stringify(clientes));

// ===============================
// MOSTRAR CLIENTES
// ===============================
function mostrarClientes(){
    let tabla = document.getElementById("tablaClientes");
    tabla.innerHTML = "";

    clientes.forEach(cliente => {
        tabla.innerHTML += `
            <tr>
                <td>${cliente.nombre}</td>
                <td>${cliente.telefono}</td>
                <td>${cliente.email}</td>
            </tr>
        `;
    });
}

// ===============================
// AGREGAR CLIENTE
// ===============================
document.getElementById("formCliente").addEventListener("submit", function(e){
    e.preventDefault();

    let nombre = document.getElementById("nombre").value;
    let telefono = document.getElementById("telefono").value;
    let email = document.getElementById("email").value;

    clientes.push({nombre, telefono, email});

    localStorage.setItem("clientes", JSON.stringify(clientes));

    mostrarClientes();

    this.reset();
});

// ===============================
// INICIALIZAR
// ===============================
mostrarClientes();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
