<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100">

<script>
if(sessionStorage.getItem("login")!=="ok"){
    window.location="index.html";
}
</script>

<header class="bg-primary text-white py-4">
    <div class="container">
        <h1 class="mb-0">Módulo de Clientes</h1>
    </div>
</header>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="inicio.html">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="ventas.html">Ventas</a></li>
                <li class="nav-item"><a class="nav-link" href="productos.html">Productos</a></li>
                <li class="nav-item"><a class="nav-link active" href="clientes.html">Clientes</a></li>
            </ul>
        </div>
    </div>
</nav>

<section class="container flex-grow-1 py-5">
    <div class="row">
        <article class="col-md-8">

            <!-- FORMULARIO -->
            <div class="card mb-4">
                <div class="card-body">
                    <h2 class="card-title mb-4">Registrar Cliente</h2>

                    <form id="formCliente">
                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" id="nombre" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Teléfono</label>
                            <input type="tel" id="telefono" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" id="email" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Guardar Cliente</button>
                    </form>
                </div>
            </div>

            <!-- TABLA -->
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Clientes Registrados</h5>
                    <table class="table table-striped table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>Nombre</th>
                                <th>Teléfono</th>
                                <th>Email</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tablaClientes"></tbody>
                    </table>
                </div>
            </div>

        </article>

        <aside class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <h3 class="card-title">Ayuda</h3>
                    <p class="card-text">Agrega y consulta los datos de tus clientes. Puedes editar o eliminar cualquier cliente.</p>
                </div>
            </div>
        </aside>
    </div>
</section>

<!-- Modal para editar cliente -->
<div class="modal fade" id="editarClienteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Editar Cliente</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="formEditarCliente">
                    <input type="hidden" id="editarClienteId">
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" id="editarNombre" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Teléfono</label>
                        <input type="tel" id="editarTelefono" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" id="editarEmail" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                </form>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-white text-center py-3 mt-auto">
    <p class="mb-0">Derechos reservados ©</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ===============================
// CRUD DE CLIENTES
// ===============================

const KEY_CLIENTES = 'clientes';

// Obtener clientes del localStorage
function obtenerClientes() {
    const datos = localStorage.getItem(KEY_CLIENTES);
    let clientes = datos ? JSON.parse(datos) : [];
    
    // Migrar clientes viejos que no tengan ID
    clientes = clientes.map((c, index) => {
        if (!c.id) {
            return { ...c, id: index + Date.now() };
        }
        return c;
    });
    
    // Guardar los cambios de migración
    if (clientes.some(c => !c.id)) {
        localStorage.setItem(KEY_CLIENTES, JSON.stringify(clientes));
    }
    
    return clientes;
}

// Guardar clientes en localStorage
function guardarClientes(clientes) {
    localStorage.setItem(KEY_CLIENTES, JSON.stringify(clientes));
}

// Crear nuevo cliente
document.getElementById('formCliente').addEventListener('submit', (e) => {
    e.preventDefault();
    
    const nombre = document.getElementById('nombre').value.trim();
    const telefono = document.getElementById('telefono').value.trim();
    const email = document.getElementById('email').value.trim();
    
    if (!nombre || !telefono || !email) {
        alert('Por favor completa todos los campos');
        return;
    }
    
    const clientes = obtenerClientes();
    const nuevoCliente = {
        id: Date.now(),
        nombre,
        telefono,
        email,
        fechaRegistro: new Date().toLocaleDateString()
    };
    
    clientes.push(nuevoCliente);
    guardarClientes(clientes);
    
    document.getElementById('formCliente').reset();
    cargarClientes();
    alert('Cliente registrado correctamente');
});

// Cargar y mostrar clientes
function cargarClientes() {
    const clientes = obtenerClientes();
    const tabla = document.getElementById('tablaClientes');
    tabla.innerHTML = '';
    
    if (clientes.length === 0) {
        tabla.innerHTML = '<tr><td colspan="4" class="text-center">No hay clientes registrados</td></tr>';
        return;
    }
    
    clientes.forEach(cliente => {
        const fila = document.createElement('tr');
        fila.innerHTML = `
            <td>${cliente.nombre}</td>
            <td>${cliente.telefono}</td>
            <td>${cliente.email}</td>
            <td>
                <button class="btn btn-sm btn-warning" onclick="abrirEditarCliente(${cliente.id})">
                    ✎ Editar
                </button>
                <button class="btn btn-sm btn-danger" onclick="eliminarCliente(${cliente.id})">
                    🗑 Eliminar
                </button>
            </td>
        `;
        tabla.appendChild(fila);
    });
}

// Abrir modal para editar
function abrirEditarCliente(id) {
    const clientes = obtenerClientes();
    const cliente = clientes.find(c => c.id === id);
    
    if (cliente) {
        document.getElementById('editarClienteId').value = String(cliente.id);
        document.getElementById('editarNombre').value = cliente.nombre;
        document.getElementById('editarTelefono').value = cliente.telefono;
        document.getElementById('editarEmail').value = cliente.email;
        
        const modal = new bootstrap.Modal(document.getElementById('editarClienteModal'));
        modal.show();
    }
}

// Guardar cambios del cliente editado
document.getElementById('formEditarCliente').addEventListener('submit', (e) => {
    e.preventDefault();
    
    const idValue = document.getElementById('editarClienteId').value;
    const nombre = document.getElementById('editarNombre').value.trim();
    const telefono = document.getElementById('editarTelefono').value.trim();
    const email = document.getElementById('editarEmail').value.trim();
    
    if (!nombre || !telefono || !email) {
        alert('Por favor completa todos los campos');
        return;
    }
    
    let clientes = obtenerClientes();
    const clienteIndex = clientes.findIndex(c => String(c.id) === String(idValue));
    
    if (clienteIndex !== -1) {
        clientes[clienteIndex] = {
            ...clientes[clienteIndex],
            nombre,
            telefono,
            email
        };
        
        guardarClientes(clientes);
        cargarClientes();
        
        bootstrap.Modal.getInstance(document.getElementById('editarClienteModal')).hide();
        alert('Cliente actualizado correctamente');
    } else {
        alert('Cliente no encontrado');
    }
});

// Eliminar cliente
function eliminarCliente(id) {
    if (confirm('¿Estás seguro de que deseas eliminar este cliente?')) {
        let clientes = obtenerClientes();
        const clientesAntes = clientes.length;
        clientes = clientes.filter(c => c.id !== id);
        
        if (clientes.length < clientesAntes) {
            guardarClientes(clientes);
            cargarClientes();
            alert('Cliente eliminado correctamente');
        } else {
            alert('No se pudo eliminar el cliente');
        }
    }
}

// Cargar clientes al abrir la página
cargarClientes();
</script>

</body>
</html>
