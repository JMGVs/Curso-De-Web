<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pago con Tarjeta</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100">

<script>
if(sessionStorage.getItem("login")!=="ok"){
    window.location="index.html";
}
</script>

<header class="bg-success text-white py-4">
    <div class="container">
        <h1 class="mb-0">Pago con Tarjeta</h1>
    </div>
</header>

<section class="container flex-grow-1 py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow">
                <div class="card-body">

                    <h3 class="mb-4 text-center">Ingrese datos de la tarjeta</h3>

                    <h5 class="text-center mb-3">
                        Total a pagar: <span id="totalPagar" class="text-success">$0.00</span>
                    </h5>

                    <form id="formPago">

                        <div class="mb-3">
                            <label class="form-label">Número de tarjeta</label>
                            <input type="text" id="tarjeta" class="form-control" maxlength="16" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Nombre del titular</label>
                            <input type="text" id="titular" class="form-control" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Expiración</label>
                                <input type="month" id="expiracion" class="form-control" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">CVV</label>
                                <input type="password" id="cvv" class="form-control" maxlength="3" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-success w-100">Pagar</button>

                        <p id="mensaje" class="text-center mt-3"></p>

                    </form>

                </div>
            </div>

        </div>
    </div>
</section>

<footer class="bg-dark text-white text-center py-3 mt-auto">
    <p class="mb-0">Sistema POS</p>
</footer>

<script>
// ===============================
// OBTENER TOTAL DE LA ÚLTIMA VENTA
// ===============================
let ventas = JSON.parse(localStorage.getItem("ventas")) || [];
let total = 0;

if(ventas.length > 0){
    total = ventas[ventas.length - 1].total;
}

document.getElementById("totalPagar").textContent = "$" + total.toFixed(2);

// ===============================
// VALIDACIÓN Y SIMULACIÓN DE PAGO
// ===============================
document.getElementById("formPago").addEventListener("submit", function(e){
    e.preventDefault();

    let tarjeta = document.getElementById("tarjeta").value;
    let titular = document.getElementById("titular").value;
    let expiracion = document.getElementById("expiracion").value;
    let cvv = document.getElementById("cvv").value;
    let mensaje = document.getElementById("mensaje");

    // Validaciones básicas
    if(tarjeta.length !== 16){
        mensaje.textContent = "Número de tarjeta inválido";
        mensaje.className = "text-danger";
        return;
    }

    if(cvv.length !== 3){
        mensaje.textContent = "CVV inválido";
        mensaje.className = "text-danger";
        return;
    }

    // Simulación de pago exitoso
    mensaje.textContent = "✅ Pago realizado con éxito";
    mensaje.className = "text-success";

    // Opcional: limpiar ventas (como ticket pagado)
    // localStorage.removeItem("ventas");

    setTimeout(()=>{
        window.location = "ventas.html";
    }, 2000);
});
</script>

</body>
</html>
