<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100">

<script>
if(sessionStorage.getItem("login")!=="ok"){
    window.location="index.html";
}
</script>

<header class="bg-primary text-white py-4">
    <div class="container">
        <h1 class="mb-0">Módulo de Productos</h1>
    </div>
</header>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="inicio.html">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="ventas.html">Ventas</a></li>
                <li class="nav-item"><a class="nav-link active" href="productos.html">Productos</a></li>
                <li class="nav-item"><a class="nav-link" href="clientes.html">Clientes</a></li>
                <li class="nav-item"><a class="nav-link" href="reportes.html">Reportes</a></li>
            </ul>
        </div>
    </div>
</nav>

<section class="container flex-grow-1 py-5">
    <div class="row">
        <article class="col-md-8">

            <!-- FORMULARIO -->
            <div class="card mb-4">
                <div class="card-body">
                    <h2 class="card-title mb-4">Agregar Producto</h2>
                    <form id="formProducto">
                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" id="nombre" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Precio</label>
                            <input type="number" id="precio" class="form-control" step="0.01" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Cantidad</label>
                            <input type="number" id="cantidad" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Guardar Producto</button>
                    </form>
                </div>
            </div>

            <!-- TABLA -->
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Productos Disponibles</h5>
                    <table class="table table-striped table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>Nombre</th>
                                <th>Precio</th>
                                <th>Cantidad</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tablaProductos"></tbody>
                    </table>
                </div>
            </div>

        </article>

        <aside class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <h3 class="card-title">Ayuda</h3>
                    <p class="card-text">Registra y visualiza los productos disponibles. Puedes editar o eliminar cualquier producto.</p>
                </div>
            </div>
        </aside>
    </div>
</section>

<!-- Modal para editar producto -->
<div class="modal fade" id="editarProductoModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Editar Producto</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="formEditarProducto">
                    <input type="hidden" id="editarProductoId">
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" id="editarNombre" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Precio</label>
                        <input type="number" id="editarPrecio" class="form-control" step="0.01" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Cantidad</label>
                        <input type="number" id="editarCantidad" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                </form>
            </div>
        </div>
    </div>
</div>
    
<footer class="bg-dark text-white text-center py-3 mt-auto">
    <p class="mb-0">Derechos reservados ©</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ===============================
// CRUD DE PRODUCTOS
// ===============================

const KEY_PRODUCTOS = 'productos';

// Obtener productos del localStorage
function obtenerProductos() {
    const datos = localStorage.getItem(KEY_PRODUCTOS);
    let productos = datos ? JSON.parse(datos) : [];
    
    // Migrar productos viejos que no tengan ID
    productos = productos.map((p, index) => {
        if (!p.id) {
            return { ...p, id: index + Date.now() };
        }
        return p;
    });
    
    // Guardar los cambios de migración
    if (productos.some(p => !p.id)) {
        localStorage.setItem(KEY_PRODUCTOS, JSON.stringify(productos));
    }
    
    return productos;
}

// Guardar productos en localStorage
function guardarProductos(productos) {
    localStorage.setItem(KEY_PRODUCTOS, JSON.stringify(productos));
}

// Crear nuevo producto
document.getElementById('formProducto').addEventListener('submit', (e) => {
    e.preventDefault();
    
    const nombre = document.getElementById('nombre').value.trim();
    const precio = parseFloat(document.getElementById('precio').value);
    const cantidad = parseInt(document.getElementById('cantidad').value);
    
    if (!nombre || precio <= 0 || cantidad < 0) {
        alert('Por favor completa todos los campos correctamente');
        return;
    }
    
    const productos = obtenerProductos();
    const nuevoProducto = {
        id: Date.now(),
        nombre,
        precio,
        cantidad,
        fechaCreacion: new Date().toLocaleDateString()
    };
    
    productos.push(nuevoProducto);
    guardarProductos(productos);
    
    document.getElementById('formProducto').reset();
    cargarProductos();
    alert('Producto agregado correctamente');
});

// Cargar y mostrar productos
function cargarProductos() {
    const productos = obtenerProductos();
    const tabla = document.getElementById('tablaProductos');
    tabla.innerHTML = '';
    
    if (productos.length === 0) {
        tabla.innerHTML = '<tr><td colspan="4" class="text-center">No hay productos registrados</td></tr>';
        return;
    }
    
    productos.forEach(producto => {
        const fila = document.createElement('tr');
        fila.innerHTML = `
            <td>${producto.nombre}</td>
            <td>$${producto.precio.toFixed(2)}</td>
            <td>${producto.cantidad}</td>
            <td>
                <button class="btn btn-sm btn-warning" onclick="abrirEditarProducto(${producto.id})">
                    ✎ Editar
                </button>
                <button class="btn btn-sm btn-danger" onclick="eliminarProducto(${producto.id})">
                    🗑 Eliminar
                </button>
            </td>
        `;
        tabla.appendChild(fila);
    });
}

// Abrir modal para editar
function abrirEditarProducto(id) {
    const productos = obtenerProductos();
    const producto = productos.find(p => p.id === id);
    
    if (producto) {
        document.getElementById('editarProductoId').value = String(producto.id);
        document.getElementById('editarNombre').value = producto.nombre;
        document.getElementById('editarPrecio').value = producto.precio;
        document.getElementById('editarCantidad').value = producto.cantidad;
        
        const modal = new bootstrap.Modal(document.getElementById('editarProductoModal'));
        modal.show();
    }
}

// Guardar cambios del producto editado
document.getElementById('formEditarProducto').addEventListener('submit', (e) => {
    e.preventDefault();
    
    const idValue = document.getElementById('editarProductoId').value;
    const nombre = document.getElementById('editarNombre').value.trim();
    const precio = parseFloat(document.getElementById('editarPrecio').value);
    const cantidad = parseInt(document.getElementById('editarCantidad').value);
    
    if (!nombre || precio <= 0 || cantidad < 0) {
        alert('Por favor completa todos los campos correctamente');
        return;
    }
    
    let productos = obtenerProductos();
    const productoIndex = productos.findIndex(p => String(p.id) === String(idValue));
    
    if (productoIndex !== -1) {
        productos[productoIndex] = {
            ...productos[productoIndex],
            nombre,
            precio,
            cantidad
        };
        
        guardarProductos(productos);
        cargarProductos();
        
        bootstrap.Modal.getInstance(document.getElementById('editarProductoModal')).hide();
        alert('Producto actualizado correctamente');
    } else {
        alert('Producto no encontrado');
    }
});

// Eliminar producto
function eliminarProducto(id) {
    if (confirm('¿Estás seguro de que deseas eliminar este producto?')) {
        let productos = obtenerProductos();
        const productosAntes = productos.length;
        productos = productos.filter(p => p.id !== id);
        
        if (productos.length < productosAntes) {
            guardarProductos(productos);
            cargarProductos();
            alert('Producto eliminado correctamente');
        } else {
            alert('No se pudo eliminar el producto');
        }
    }
}

// Cargar productos al abrir la página
cargarProductos();
</script>

</body>
</html>
