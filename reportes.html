<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100">

<script>
if(sessionStorage.getItem("login")!=="ok"){
    window.location="index.html";
}
</script>

<header class="bg-primary text-white py-4">
    <div class="container">
        <h1 class="mb-0">Módulo de Reportes</h1>
    </div>
</header>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="inicio.html">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="ventas.html">Ventas</a></li>
                <li class="nav-item"><a class="nav-link" href="productos.html">Productos</a></li>
                <li class="nav-item"><a class="nav-link" href="clientes.html">Clientes</a></li>
                <li class="nav-item"><a class="nav-link active" href="reportes.html">Reportes</a></li>
            </ul>
        </div>
    </div>
</nav>

<section class="container flex-grow-1 py-5">
    <div class="row">
        <article class="col-md-8">

            <div class="card">
                <div class="card-body">
                    <h2 class="card-title mb-4">Reportes Generales</h2>

                    <table class="table table-striped table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>Tipo</th>
                                <th>Descripción</th>
                                <th>Valor</th>
                            </tr>
                        </thead>
                        <tbody id="tablaReportes"></tbody>
                    </table>

                </div>
            </div>

        </article>
    </div>
</section>
    
<footer class="bg-dark text-white text-center py-3 mt-auto">
    <p class="mb-0">Sistema POS</p>
</footer>

<script>
// ===============================
// CARGAR DATOS
// ===============================
let ventas = JSON.parse(localStorage.getItem("ventas")) || [];
let productos = JSON.parse(localStorage.getItem("productos")) || [];
let clientes = JSON.parse(localStorage.getItem("clientes")) || [];

// ===============================
// GENERAR REPORTES
// ===============================
function generarReportes(){

    let totalVentas = 0;
    let totalCantidadVendida = 0;
    let contadorProductos = {};
    let productoTop = "N/A";
    let max = 0;

    ventas.forEach(v => {
        totalVentas += v.total;
        totalCantidadVendida += v.cantidad;

        // contar productos
        if(!contadorProductos[v.producto]){
            contadorProductos[v.producto] = 0;
        }
        contadorProductos[v.producto] += v.cantidad;
    });

    // producto más vendido
    for(let prod in contadorProductos){
        if(contadorProductos[prod] > max){
            max = contadorProductos[prod];
            productoTop = prod;
        }
    }

    // total inventario
    let totalInventario = productos.reduce((sum, p) => sum + p.cantidad, 0);

    // ===============================
    // MOSTRAR EN TABLA
    // ===============================
    let tabla = document.getElementById("tablaReportes");

    tabla.innerHTML = `
        <tr>
            <td>Ventas</td>
            <td>Total generado</td>
            <td>$${totalVentas.toFixed(2)}</td>
        </tr>
        <tr>
            <td>Ventas</td>
            <td>Número de ventas</td>
            <td>${ventas.length}</td>
        </tr>
        <tr>
            <td>Productos</td>
            <td>Stock total</td>
            <td>${totalInventario}</td>
        </tr>
        <tr>
            <td>Clientes</td>
            <td>Total registrados</td>
            <td>${clientes.length}</td>
        </tr>
        <tr>
            <td>Top</td>
            <td>Producto más vendido</td>
            <td>${productoTop}</td>
        </tr>
    `;
}

// ===============================
// INICIALIZAR
// ===============================
generarReportes();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
