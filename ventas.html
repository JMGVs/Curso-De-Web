<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ventas</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100">

<script>
if(sessionStorage.getItem("login")!=="ok"){
    window.location="index.html";
}
</script>

<header class="bg-primary text-white py-4">
    <div class="container">
        <h1 class="mb-0">Módulo de Ventas</h1>
    </div>
</header>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="inicio.html">Inicio</a></li>
                <li class="nav-item"><a class="nav-link active" href="ventas.html">Ventas</a></li>
                <li class="nav-item"><a class="nav-link" href="productos.html">Productos</a></li>
            </ul>
        </div>
    </div>
</nav>

<section class="container flex-grow-1 py-5">
    <div class="row">
        <article class="col-md-8">

            <!-- FORMULARIO -->
            <div class="card mb-4">
                <div class="card-body">
                    <h2 class="card-title mb-4">Registrar Venta</h2>

                    <form id="formVenta">

                        <div class="mb-3">
                            <label class="form-label">Producto</label>
                            <select id="producto" class="form-control"></select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Cantidad</label>
                            <input type="number" id="cantidad" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Precio</label>
                            <input type="number" id="precio" class="form-control" step="0.01" readonly>
                        </div>

                        <button type="submit" class="btn btn-primary">Guardar Venta</button>
                    </form>

                    <!-- BOTÓN DE PAGO (OCULTO AL INICIO) -->
                    <a href="pago.html" id="btnPagar" class="btn btn-success mt-3 d-none">
                        Ir a pagar
                    </a>

                </div>
            </div>

            <!-- TABLA -->
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Ventas Recientes</h5>
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>Producto</th>
                                <th>Cantidad</th>
                                <th>Precio</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody id="tablaVentas"></tbody>
                    </table>
                </div>
            </div>

        </article>
    </div>
</section>

<footer class="bg-dark text-white text-center py-3 mt-auto">
    <p class="mb-0">Sistema POS</p>
</footer>

<script>
// ===============================
// CARGAR DATOS
// ===============================
let productos = JSON.parse(localStorage.getItem("productos")) || [];
let ventas = JSON.parse(localStorage.getItem("ventas")) || [];

// ===============================
// LLENAR SELECT
// ===============================
function cargarProductos() {
    let select = document.getElementById("producto");
    select.innerHTML = "";

    productos.forEach((prod, index) => {
        select.innerHTML += `<option value="${index}">${prod.nombre}</option>`;
    });

    actualizarPrecio();
}

// ===============================
// PRECIO AUTOMÁTICO
// ===============================
function actualizarPrecio() {
    let index = document.getElementById("producto").value;
    let precio = productos[index]?.precio || 0;

    document.getElementById("precio").value = precio;
}

document.getElementById("producto").addEventListener("change", actualizarPrecio);

// ===============================
// MOSTRAR VENTAS
// ===============================
function mostrarVentas() {
    let tabla = document.getElementById("tablaVentas");
    tabla.innerHTML = "";

    ventas.forEach(v => {
        tabla.innerHTML += `
            <tr>
                <td>${v.producto}</td>
                <td>${v.cantidad}</td>
                <td>$${v.precio}</td>
                <td>$${v.total}</td>
            </tr>
        `;
    });
}

// ===============================
// REGISTRAR VENTA
// ===============================
document.getElementById("formVenta").addEventListener("submit", function(e){
    e.preventDefault();

    let index = document.getElementById("producto").value;
    let cantidad = parseInt(document.getElementById("cantidad").value);
    let producto = productos[index];

    if(cantidad > producto.cantidad){
        alert("No hay suficiente stock");
        return;
    }

    let total = cantidad * producto.precio;

    // Guardar venta
    ventas.push({
        producto: producto.nombre,
        cantidad: cantidad,
        precio: producto.precio,
        total: total
    });

    // Restar inventario
    producto.cantidad -= cantidad;

    // Guardar en localStorage
    localStorage.setItem("ventas", JSON.stringify(ventas));
    localStorage.setItem("productos", JSON.stringify(productos));

    // Mostrar datos
    mostrarVentas();
    cargarProductos();

    // MOSTRAR BOTÓN DE PAGO
    document.getElementById("btnPagar").classList.remove("d-none");

    this.reset();
});

// ===============================
// INICIALIZAR
// ===============================
cargarProductos();
mostrarVentas();
</script>

</body>
</html>
